# Docker Compose configuration for surroNMA Dashboard v5.0
#
# Quick start:
#   docker-compose up -d
#
# Access dashboard at: http://localhost:3838
#
# With AI features:
#   ENABLE_AI=true docker-compose up -d

version: '3.8'

services:
  surronma-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: surronma-app
    ports:
      - "3838:3838"      # Shiny dashboard
      - "11434:11434"    # Ollama AI (optional)
    volumes:
      # Persistent data storage
      - surronma-data:/data
      # Optional: Mount local files for development
      # - ./:/app
    environment:
      - ENABLE_AI=${ENABLE_AI:-false}
      - SHINY_LOG_LEVEL=${SHINY_LOG_LEVEL:-INFO}
      - TZ=UTC
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3838/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - surronma-network
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # Optional: Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: surronma-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - surronma-dashboard
    restart: unless-stopped
    networks:
      - surronma-network
    profiles:
      - with-proxy

  # Optional: PostgreSQL for production deployments
  postgres:
    image: postgres:15-alpine
    container_name: surronma-db
    environment:
      - POSTGRES_DB=surronma
      - POSTGRES_USER=${POSTGRES_USER:-surronma}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - surronma-network
    profiles:
      - with-postgres

  # Optional: Redis for session management and caching
  redis:
    image: redis:7-alpine
    container_name: surronma-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - surronma-network
    profiles:
      - with-redis

volumes:
  surronma-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  surronma-network:
    driver: bridge
