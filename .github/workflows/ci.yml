name: Continuous Integration

on:
  push:
    branches: [ main, develop, claude/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [ubuntu-latest]
        r-version: ['4.4']
        # Full matrix: [ubuntu-latest, macos-latest, windows-latest] × ['4.2', '4.3', '4.4']
        # Reduced to avoid GitHub Actions concurrent job limits

    steps:
    - uses: actions/checkout@v3

    - name: Set up R ${{ matrix.r-version }}
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ matrix.r-version }}
        use-public-rspm: true

    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcurl4-openssl-dev \
          libssl-dev \
          libxml2-dev \
          libfontconfig1-dev \
          libharfbuzz-dev \
          libfribidi-dev \
          libfreetype6-dev \
          libpng-dev \
          libtiff5-dev \
          libjpeg-dev \
          libcairo2-dev

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cairo
        brew install harfbuzz
        brew install fribidi

    - name: Query dependencies
      run: |
        install.packages('remotes')
        saveRDS(remotes::dev_package_deps(dependencies = TRUE), ".github/depends.Rds", version = 2)
        writeLines(sprintf("R-%i.%i", getRversion()$major, getRversion()$minor), ".github/R-version")
      shell: Rscript {0}

    - name: Restore R package cache
      uses: actions/cache@v3
      with:
        path: ${{ env.R_LIBS_USER }}
        key: ${{ runner.os }}-${{ hashFiles('.github/R-version') }}-1-${{ hashFiles('.github/depends.Rds') }}
        restore-keys: ${{ runner.os }}-${{ hashFiles('.github/R-version') }}-1-

    - name: Install R dependencies
      run: |
        install.packages(c("remotes", "rcmdcheck", "devtools", "covr", "testthat"))
        remotes::install_deps(dependencies = TRUE)
      shell: Rscript {0}

    - name: Session info
      run: |
        options(width = 100)
        pkgs <- installed.packages()[, "Package"]
        sessioninfo::session_info(pkgs, include_base = TRUE)
      shell: Rscript {0}

    - name: Check R package
      env:
        _R_CHECK_CRAN_INCOMING_: false
        _R_CHECK_FORCE_SUGGESTS_: false
      run: rcmdcheck::rcmdcheck(args = c("--no-manual", "--as-cran"), error_on = "warning", check_dir = "check")
      shell: Rscript {0}

    - name: Run devtools tests
      run: |
        devtools::load_all()
        devtools::test()
      shell: Rscript {0}

    - name: Run comprehensive unit tests
      run: |
        if (file.exists("tests/test_unit_tests.R")) {
          source("tests/test_unit_tests.R")
          run_all_unit_tests()
        } else {
          message("Unit test file not found, skipping")
        }
      shell: Rscript {0}

    - name: Upload check results
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: ${{ runner.os }}-r${{ matrix.r-version }}-results
        path: check

    - name: Test coverage
      if: matrix.os == 'ubuntu-latest' && matrix.r-version == '4.4'
      run: |
        covr::codecov(
          quiet = FALSE,
          clean = FALSE,
          install_path = file.path(Sys.getenv("RUNNER_TEMP"), "package")
        )
      shell: Rscript {0}
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up R
      uses: r-lib/actions/setup-r@v2

    - name: Install lintr
      run: install.packages("lintr")
      shell: Rscript {0}

    - name: Lint code
      run: lintr::lint_package()
      shell: Rscript {0}

  selenium-gui-tests:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v3

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.4'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcurl4-openssl-dev \
          libssl-dev \
          libxml2-dev \
          libcairo2-dev \
          default-jre \
          firefox \
          xvfb

    - name: Install R dependencies
      run: |
        install.packages(c("remotes", "devtools"))
        remotes::install_deps(dependencies = TRUE)
        install.packages(c("RSelenium", "shiny", "bs4Dash", "DT", "plotly"))
      shell: Rscript {0}

    - name: Start Xvfb (virtual display)
      run: |
        sudo Xvfb :99 -ac -screen 0 1920x1080x24 &
        sleep 3
      env:
        DISPLAY: :99

    - name: Run mock GUI tests
      run: |
        if (file.exists("tests/test_selenium_gui.R")) {
          source("tests/test_selenium_gui.R")
          run_mock_gui_tests()
        } else {
          message("Selenium test file not found, skipping")
        }
      shell: Rscript {0}
      env:
        DISPLAY: :99

    - name: Upload test screenshots
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: selenium-screenshots
        path: screenshots/
        if-no-files-found: ignore

  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: docker build -t surronma:${{ github.sha }} .

    - name: Test Docker image
      run: |
        docker run --rm surronma:${{ github.sha }} R -e "library(surroNMA); packageVersion('surroNMA')"
